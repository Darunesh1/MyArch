# ═══════════════════════════════════════════════════════════════════════════
# AUTOSTART - Startup Applications
# ═══════════════════════════════════════════════════════════════════════════

# Set programs that you use
# (defined in variables.conf as $terminal, $fileManager, $menu)

# Core services
exec-once = waybar & disown
exec-once = swaync

# Clipboard Manager - Stores text and image data
exec-once = wl-paste --type text --watch cliphist store
exec-once = wl-paste --type image --watch cliphist store

# Wallpaper Daemon
exec-once = awww-daemon
exec-once = ~/.config/hypr/scripts/wallpaper/awww-cycle.sh

# Dark Mode GSettings
exec-once = gsettings set org.gnome.desktop.interface color-scheme 'prefer-dark'
exec-once = gsettings set org.gnome.desktop.interface gtk-theme 'Adwaita-dark'

# For hypridle
exec-once = hypridle

# GNOME Keyring
exec-once = eval $(gnome-keyring-daemon --start --components=secrets,ssh,pkcs11)


