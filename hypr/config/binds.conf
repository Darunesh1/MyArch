# ═══════════════════════════════════════════════════════════════════════════
# KEYBINDINGS
# ═══════════════════════════════════════════════════════════════════════════

$mainMod = SUPER # Sets "Windows" key as main modifier


# ── System ──────────────────────────────────────────────────────────────────
# Lock screen
bind = $mainMod, L, exec, hyprlock

# Kill active window
bind = $mainMod, Q, killactive,
bind = ALT,F4, killactive,

# Toggle floating
bind = $mainMod, w, togglefloating,

# Power profile menu
bind = $mainMod SHIFT, G, exec, ~/.config/hypr/scripts/power/profile-menu.sh

bind = SUPER CTRL, S, exec, ~/.config/hypr/scripts/shader-menu.sh


# ── Applications ────────────────────────────────────────────────────────────
bind = $mainMod, T, exec, $terminal
bind = $mainMod, E, exec, $fileManager
bind = $mainMod, B, exec, firefox
bind = $mainMod, A, exec, $menu
# ── Emoji Picker ────────────────────────────────────────────────────────────
bind = $mainMod, period, exec, rofimoji --action type


# ── Layout Controls ─────────────────────────────────────────────────────────
bind = $mainMod SHIFT, W, pseudo, # dwindle
bind = $mainMod, J, layoutmsg, togglesplit # dwindle


# ── Fullscreen ──────────────────────────────────────────────────────────────
bind = $mainMod, F, fullscreen        # normal
bind = $mainMod SHIFT, F, fullscreen, 1  # true fullscreen


# ── Power Menu (wlogout) ────────────────────────────────────────────────────
bind = CTRL ALT, Delete, exec, wlogout


# ── Waybar Reload ───────────────────────────────────────────────────────────
bind = $mainMod, R , exec , ~/.config/waybar/scripts/launch.sh


# ── Screenshots ─────────────────────────────────────────────────────────────
# Screenshot a selected area (SUPER + SHIFT + S)
bind = $mainMod, P, exec, bash -c 'mkdir -p ~/Pictures/Screenshots && grim -g "$(slurp)" - | tee ~/Pictures/Screenshots/Screenshot_$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy'

# Screenshot the entire screen (Print Screen key)
bind = , Print, exec, bash -c 'mkdir -p ~/Pictures/Screenshots && grim - | tee ~/Pictures/Screenshots/Screenshot_$(date +%Y-%m-%d_%H-%M-%S).png | wl-copy'

# ── Window Cycling (Alt + Tab) ──────────────────────────────────────────────
# Cycle through windows in the current workspace
bind = ALT, Tab, cyclenext,
bind = ALT, Tab, bringactivetotop,

# ── Laptop Lid Switch ───────────────────────────────────────────────────────
# Lock the screen and suspend when the lid is closed
bindl = , switch:on:Lid Switch, exec, hyprlock
bindl = , switch:on:Lid Switch, exec, systemctl suspend


# ── Window Navigation ───────────────────────────────────────────────────────
# Move focus with mainMod + arrow keys
bind = $mainMod, left, movefocus, l
bind = $mainMod, right, movefocus, r
bind = $mainMod, up, movefocus, u
bind = $mainMod, down, movefocus, d


# ── Workspaces ──────────────────────────────────────────────────────────────
# Switch workspaces with mainMod + [0-9]
bind = $mainMod, 1, workspace, 1
bind = $mainMod, 2, workspace, 2
bind = $mainMod, 3, workspace, 3
bind = $mainMod, 4, workspace, 4
bind = $mainMod, 5, workspace, 5
bind = $mainMod, 6, workspace, 6
bind = $mainMod, 7, workspace, 7
bind = $mainMod, 8, workspace, 8
bind = $mainMod, 9, workspace, 9
bind = $mainMod, 0, workspace, 10

# Move active window to a workspace with mainMod + SHIFT + [0-9]
bind = $mainMod SHIFT, 1, movetoworkspace, 1
bind = $mainMod SHIFT, 2, movetoworkspace, 2
bind = $mainMod SHIFT, 3, movetoworkspace, 3
bind = $mainMod SHIFT, 4, movetoworkspace, 4
bind = $mainMod SHIFT, 5, movetoworkspace, 5
bind = $mainMod SHIFT, 6, movetoworkspace, 6
bind = $mainMod SHIFT, 7, movetoworkspace, 7
bind = $mainMod SHIFT, 8, movetoworkspace, 8
bind = $mainMod SHIFT, 9, movetoworkspace, 9
bind = $mainMod SHIFT, 0, movetoworkspace, 10

# Special workspace (scratchpad)
bind = $mainMod, S, togglespecialworkspace, magic
bind = $mainMod SHIFT, S, movetoworkspace, special:magic

# Scroll through existing workspaces with mainMod + scroll
bind = $mainMod, mouse_down, workspace, e+1
bind = $mainMod, mouse_up, workspace, e-1


# ── Mouse Controls ──────────────────────────────────────────────────────────
# Move/resize windows with mainMod + LMB/RMB and dragging
bindm = $mainMod, mouse:272, movewindow
bindm = $mainMod, mouse:273, resizewindow


# ── Multimedia Keys ─────────────────────────────────────────────────────────
# Volume control
bindel = ,XF86AudioRaiseVolume, exec, wpctl set-volume -l 2.5 @DEFAULT_AUDIO_SINK@ 5%+
bindel = ,XF86AudioLowerVolume, exec, wpctl set-volume @DEFAULT_AUDIO_SINK@ 5%-
bindel = ,XF86AudioMute, exec, wpctl set-mute @DEFAULT_AUDIO_SINK@ toggle
bindel = ,XF86AudioMicMute, exec, wpctl set-mute @DEFAULT_AUDIO_SOURCE@ toggle

# Brightness control
bindel = ,XF86MonBrightnessUp, exec, brightnessctl -e4  set 5%+
bindel = ,XF86MonBrightnessDown, exec, brightnessctl -e4  set 5%-

# Media playback (requires playerctl)
bindl = , XF86AudioNext, exec, playerctl next
bindl = , XF86AudioPause, exec, playerctl play-pause
bindl = , XF86AudioPlay, exec, playerctl play-pause
bindl = , XF86AudioPrev, exec, playerctl previous


# ── Clipboard Manager ───────────────────────────────────────────────────────
bind = $mainMod, V, exec, cliphist list | rofi -dmenu -i -matching fuzzy -p "󰅍  Clipboard" -theme ~/.config/rofi/themes/clipboard.rasi | cliphist decode | wl-copy

# ── OCR Snipper ─────────────────────────────────────────────────────────────
# Capture region and extract text to clipboard
bind = ALT, X, exec, ~/.local/bin/ocr-snipper
