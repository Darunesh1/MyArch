# ═══════════════════════════════════════════════════════════════════════════
#  hyprlock.conf  —  Minimalist Lock Screen
# ═══════════════════════════════════════════════════════════════════════════

source = ~/.config/hypr/hyprlock-colors.conf

general {
    no_fade_in        = false
    no_fade_out       = false
    grace             = 0
    disable_loading   = false
    hide_cursor       = true
    text_trim         = true
}

# ── Background — clear current wallpaper ────────────────────────────────────
background {
    monitor     =
    path        = /home/darriour/Pictures/Wallpaper/current_wallpaper
    blur_passes = 0
    brightness  = 1.0
    contrast    = 1.0
}

# ── Clock — large 24h time, centered above password ─────────────────────────
label {
    monitor       =
    text          = $TIME
    color         = $foreground
    font_family   = JetBrainsMono Nerd Font
    font_size     = 88
    position      = 0, 100
    halign        = center
    valign        = center
    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(00000088)
}

# ── Password input field — center ───────────────────────────────────────────
input-field {
    monitor             =
    size                = 280, 48

    outline_thickness   = 0
    dots_size           = 0.28
    dots_spacing        = 0.18
    dots_center         = true
    dots_rounding       = -1

    outer_color         = rgba(00000000)
    inner_color         = $background
    font_color          = $foreground

    check_color         = $color10
    fail_color          = $color9
    fail_text           = "󰍹  wrong password"
    fail_transition     = 300

    capslock_color      = $color11
    capslock_nb_text    = " caps"

    fade_on_empty       = true
    placeholder_text    = '<span foreground="##5c6370"><i>  enter password</i></span>'
    hide_input          = false
    rounding            = 12

    position            = 0, 0
    halign              = center
    valign              = center
}

# ── Battery — centered below password ───────────────────────────────────────
label {
    monitor       =
    text          = cmd[update:30000] bash -c 'BAT=$(cat /sys/class/power_supply/BAT*/capacity 2>/dev/null | head -1); STATUS=$(cat /sys/class/power_supply/BAT*/status 2>/dev/null | head -1); if [ -z "$BAT" ]; then exit 0; fi; if [ "$STATUS" = "Charging" ]; then ICON="󰂄"; elif [ "$BAT" -ge 90 ]; then ICON="󰁹"; elif [ "$BAT" -ge 70 ]; then ICON="󰂀"; elif [ "$BAT" -ge 50 ]; then ICON="󰁾"; elif [ "$BAT" -ge 30 ]; then ICON="󰁼"; elif [ "$BAT" -ge 15 ]; then ICON="󰁺"; else ICON="󰂃"; fi; echo "$ICON  $BAT%"'
    color         = $foreground
    font_family   = JetBrainsMono Nerd Font
    font_size     = 14
    position      = 0, -80
    halign        = center
    valign        = center
    shadow_passes = 2
    shadow_color  = rgba(00000088)
}
