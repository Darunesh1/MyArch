# ═══════════════════════════════════════════════════════════════════════════
#  hyprlock.conf  —  Redesigned lock screen
#
#  Layout (centered column):
#    ┌──────────────────────────────┐
#    │   blurred current wallpaper  │
#    │                              │
#    │        23:47                 │  ← big 24h clock
#    │    Saturday, 28 March        │  ← date
#    │                              │
#    │   ♫  Song · Artist          │  ← media (visible only if playing)
#    │                              │
#    │   [  password input  ]       │
#    │                              │
#    │   🔋 74%                     │  ← battery
#    └──────────────────────────────┘
# ═══════════════════════════════════════════════════════════════════════════

general {
    no_fade_in        = false
    no_fade_out       = false
    grace             = 0
    disable_loading   = false
    hide_cursor       = true
    text_trim         = true
}

# ── Background — current wallpaper with strong blur ─────────────────────────
background {
    monitor   =
    path      = /home/darriour/Pictures/Wallpaper/current_wallpaper
    blur_passes = 3
    blur_size   = 7
    brightness  = 0.7
    contrast    = 0.9
    vibrancy    = 0.2
}

# ── Clock — large 24h time, dead center slightly above middle ────────────────
label {
    monitor   =
    text      = cmd[update:1000] echo "<b>$(date +"%H:%M")</b>"
    color     = rgba(ffffffff)
    font_family = JetBrainsMono Nerd Font
    font_size   = 88
    position    = 0, 140
    halign      = center
    valign      = center
    shadow_passes = 2
    shadow_size   = 4
    shadow_color  = rgba(00000066)
}

# ── Date — below the clock ───────────────────────────────────────────────────
label {
    monitor   =
    text      = cmd[update:60000] echo "$(date +"%A, %d %B")"
    color     = rgba(ffffffbb)
    font_family = JetBrainsMono Nerd Font
    font_size   = 18
    position    = 0, 60
    halign      = center
    valign      = center
    shadow_passes = 1
    shadow_size   = 3
    shadow_color  = rgba(00000055)
}

# ── Media player — shows currently playing track via playerctl ───────────────
# Shows nothing if no player is active (playerctl returns empty)
label {
    monitor   =
    text      = cmd[update:2000] bash -c 'STATUS=$(playerctl status 2>/dev/null); if [ "$STATUS" = "Playing" ] || [ "$STATUS" = "Paused" ]; then TITLE=$(playerctl metadata title 2>/dev/null | cut -c1-30); ARTIST=$(playerctl metadata artist 2>/dev/null | cut -c1-20); ICON="󰝚"; [ "$STATUS" = "Paused" ] && ICON="󰏤"; echo "$ICON  $TITLE  ·  $ARTIST"; fi'
    color     = rgba(c678dddd)
    font_family = JetBrainsMono Nerd Font
    font_size   = 13
    position    = 0, 10
    halign      = center
    valign      = center
    shadow_passes = 1
    shadow_size   = 2
    shadow_color  = rgba(00000055)
}

# ── Password input field ─────────────────────────────────────────────────────
input-field {
    monitor   =
    size      = 280, 48

    outline_thickness   = 0
    dots_size           = 0.28
    dots_spacing        = 0.18
    dots_center         = true
    dots_rounding       = -1

    # Normal state: frosted dark pill
    outer_color         = rgba(00000000)
    inner_color         = rgba(1e21278a)
    font_color          = rgba(abb2bfff)

    # Caps lock warning
    check_color         = rgba(98c379ff)
    fail_color          = rgba(e06c75ff)
    fail_text           = "󰍹  wrong password"
    fail_transition     = 300

    capslock_color      = rgba(e5c07bff)
    capslock_nb_text    = " caps"

    fade_on_empty       = true
    placeholder_text    = '<span foreground="##5c6370"><i>  enter password</i></span>'
    hide_input          = false
    rounding            = 12

    position  = 0, -40
    halign    = center
    valign    = center
}

# ── Battery — bottom center ──────────────────────────────────────────────────
label {
    monitor   =
    text      = cmd[update:30000] bash -c '
        BAT=$(cat /sys/class/power_supply/BAT0/capacity 2>/dev/null)
        STATUS=$(cat /sys/class/power_supply/BAT0/status 2>/dev/null)
        if [ -z "$BAT" ]; then exit 0; fi
        if [ "$STATUS" = "Charging" ]; then ICON="󰂄"
        elif [ "$BAT" -ge 90 ]; then ICON="󰁹"
        elif [ "$BAT" -ge 70 ]; then ICON="󰂀"
        elif [ "$BAT" -ge 50 ]; then ICON="󰁾"
        elif [ "$BAT" -ge 30 ]; then ICON="󰁼"
        elif [ "$BAT" -ge 15 ]; then ICON="󰁺"
        else ICON="󰂃"; fi
        echo "$ICON  $BAT%"
    '
    color     = rgba(ffffffaa)
    font_family = JetBrainsMono Nerd Font
    font_size   = 13
    position    = 0, -120
    halign      = center
    valign      = center
    shadow_passes = 1
    shadow_color  = rgba(00000044)
}

# ── Subtle hint text at very bottom ─────────────────────────────────────────
label {
    monitor   =
    text      = "  type to unlock"
    color     = rgba(ffffff33)
    font_family = JetBrainsMono Nerd Font
    font_size   = 11
    position    = 0, -160
    halign      = center
    valign      = center
}
