# ═══════════════════════════════════════════════════════════════════════════
# HYPRLAND MAIN CONFIGURATION
# ═══════════════════════════════════════════════════════════════════════════
#
# This is the main entry point. Configuration is split into modular files
# for easier navigation and maintenance.
#
# Structure:
#   config/variables.conf    - Environment vars, programs, paths
#   config/monitors.conf     - Monitor configurations
#   config/appearance.conf   - Colors, borders, gaps, opacity
#   config/animations.conf   - Animation curves and settings
#   config/input.conf        - Keyboard, mouse, touchpad
#   config/binds.conf        - Keybindings (grouped by function)
#   config/layouts.conf      - Dwindle/Master layout settings
#   config/autostart.conf    - Startup applications
#   config/rules.conf        - Window and workspace rules
#
# Edit individual files to customize your Hyprland experience.
# ═══════════════════════════════════════════════════════════════════════════

# ── Core Configuration ──────────────────────────────────────────────────────
source = ~/.config/hypr/config/variables.conf
source = ~/.config/hypr/config/monitors.conf
source = ~/.config/hypr/config/appearance.conf
source = ~/.config/hypr/config/animations.conf
source = ~/.config/hypr/config/input.conf
source = ~/.config/hypr/config/layouts.conf
source = ~/.config/hypr/config/autostart.conf
source = ~/.config/hypr/config/binds.conf
source = ~/.config/hypr/config/rules.conf
